    com.dmap: DEBUG
spring:
  datasource:
    dynamic:
      # 配置默认数据库,及没有注解指定时走的数据库
      primary: gauss
      #严格匹配数据源,默认false. true未匹配到指定数据源时抛异常,false使用默认数据源
      strict: false
      lazy:  true
      datasource:
        gauss:
          url: jdbc:opengauss://192.168.10.196:4432/imds_nyyh_guangdong?currentSchema=public&serverTimezone=Asia/Shanghai
          username: fmdsuser
          password: Bankfund@123@
          driver-class-name: org.opengauss.Driver
          hikari:
            min-idle: 1
            max-pool-size: 1
            is-auto-commit: true
            idle-timeout: 30000
            max-lifetime: 900000
            connection-timeout: 10000
            connection-test-query: SELECT 1
